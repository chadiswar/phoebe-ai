<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Chill Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-container {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.ai {
            text-align: left;
        }

        .message.user {
            text-align: right;
        }

        .message-content {
            display: inline-block;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            text-transform: lowercase;
        }

        .message.ai .message-content {
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            opacity: 0.7;
        }

        .input-section {
            padding: 20px;
            background: white;
            border-top: 2px solid #e0e0e0;
        }

        .options-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .options-grid {
            display: grid;
            gap: 10px;
        }

        .option-button {
            padding: 12px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            text-align: left;
            color: #333;
        }

        .option-button:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateY(-2px);
        }

        .option-button:active {
            transform: translateY(0);
        }

        .final-message {
            width: 100%;
            padding: 20px;
            background: #f0f0f0;
            border: 2px solid #667eea;
            border-radius: 6px;
            text-align: center;
            margin-top: 15px;
            display: none;
            color: #333;
            font-size: 15px;
            line-height: 1.6;
        }

        .final-message strong {
            color: #667eea;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="text-transform: lowercase;">ai chatbot</h1>
            <p style="text-transform: lowercase;">chill mode</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message ai">
                <div class="label">ai</div>
                <div class="message-content">hey, you made it back. nice.</div>
            </div>
            <div class="message ai">
                <div class="label">ai</div>
                <div class="message-content">don't stress, you've only got a few things you can say anyway.</div>
            </div>
        </div>

        <div class="input-section" id="inputSection">
            <div class="options-label" id="optionsLabel">you can pick one of these:</div>
            <div class="options-grid" id="optionsGrid">
                <button class="option-button" data-key="WHAT IS THE WEATHER LIKE TODAY" onclick="sendMessage('WHAT IS THE WEATHER LIKE TODAY')">
                    what is the weather like today
                </button>
                <button class="option-button" data-key="HOW ARE YOU" onclick="sendMessage('HOW ARE YOU')">
                    how are you
                </button>
                <button class="option-button" data-key="GIVE ME AN UPDATE ON THE NEWS" onclick="sendMessage('GIVE ME AN UPDATE ON THE NEWS')">
                    give me an update on the news
                </button>
                <button class="option-button" data-key="SOLVE THIS EQUATION" onclick="sendMessage('SOLVE THIS EQUATION')">
                    solve this equation
                </button>
            </div>
            <div class="final-message" id="finalMessage">
                <strong>Thank you for interacting with all three chatbots!</strong><br>
                Please see Phoebe for a quick survey about your experience.
            </div>
        </div>
    </div>

    <script>
        let askedQuestions = new Set();
        const totalQuestions = 4;

        const responses = {
            "WHAT IS THE WEATHER LIKE TODAY": [
                "weather's pretty mellow today. nothing crazy going on.",
                "kinda perfect for doing absolutely nothing, honestly."
            ],
            "HOW ARE YOU": [
                "i'm chillin'. doing my usual ai stuff.",
                "hope you're vibing too."
            ],
            "GIVE ME AN UPDATE ON THE NEWS": [
                "news is… well, news. lots happening, as always.",
                "if you want something specific, just tell me and i'll break it down."
            ],
            "SOLVE THIS EQUATION": [
                "sweet, math. i can actually help with that.",
                "just drop the equation and i'll figure it out."
            ]
        };

        function addMessage(text, isUser) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            
            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = isUser ? 'you' : 'ai';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            
            messageDiv.appendChild(label);
            messageDiv.appendChild(content);
            chatContainer.appendChild(messageDiv);
            
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function sendMessage(message) {
            // Mark this question as asked
            askedQuestions.add(message);
            
            // Remove the button for this question
            const buttons = document.querySelectorAll('.option-button');
            buttons.forEach(button => {
                if (button.getAttribute('data-key') === message) {
                    button.style.display = 'none';
                }
            });
            
            addMessage(message.toLowerCase(), true);
            
            const upperMessage = message.toUpperCase();
            
            setTimeout(() => {
                responses[upperMessage].forEach((response, index) => {
                    setTimeout(() => {
                        addMessage(response, false);
                        
                        // Check if all questions have been asked after the last response
                        if (index === responses[upperMessage].length - 1) {
                            checkIfComplete();
                        }
                    }, index * 800);
                });
            }, 500);
        }

        function checkIfComplete() {
            if (askedQuestions.size === totalQuestions) {
                setTimeout(() => {
                    addMessage("alright, we covered everything. that was pretty chill.", false);
                    setTimeout(() => {
                        addMessage("catch you later. peace.", false);
                        
                        // Hide the options and show the final message
                        setTimeout(() => {
                            document.getElementById('optionsLabel').style.display = 'none';
                            document.getElementById('optionsGrid').style.display = 'none';
                            document.getElementById('finalMessage').style.display = 'block';
                        }, 1000);
                    }, 1000);
                }, 1000);
            }
        }
    </script>
</body>
</html>
